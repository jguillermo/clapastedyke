<!-- Rediseño Tailwind: utilities vía directivas ui. ids y data-on* intactos
     (el juego valida por id; data-on* es herencia del contrato GAS). -->
<app-marco-dialogo titulo="Ajustar inventario" [icono]="icono">

  <section uiTarjeta>
    <div uiTituloGrupo>Mermas y ajustes</div>
    <div class="relative mb-3.5">
      <div uiEtiqueta><b>Insumo</b><span uiReq>*</span><span uiPildora>Autocompletado</span></div>
      <input uiCampo id="ins_nombre" placeholder="Buscar insumo..."
        [class.resaltado]="marcas().has('ins_nombre')" [value]="valor('ins_nombre')">
      <input type="hidden" id="insumo_id">
    </div>
    <div uiGrid="two">
      <div>
        <div uiEtiqueta><b>Tipo de ajuste</b><span uiReq>*</span><span uiPildora>Dropdown</span></div>
        <select uiCampo id="tipo" data-onchange="prev()" [class.resaltado]="marcas().has('tipo')"></select>
      </div>
      <div>
        <div uiEtiqueta><b>Cantidad</b><span uiReq>*</span><span uiPildora>Número</span></div>
        <input uiCampo id="cantidad" type="number" step="any" placeholder="Ej. 200" data-oninput="prev()"
          [class.resaltado]="marcas().has('cantidad')" [value]="valor('cantidad')">
      </div>
    </div>
    <div class="mb-3.5">
      <div uiEtiqueta><b>Motivo</b><span uiOpt>recomendado en mermas</span><span uiPildora>Texto</span></div>
      <input uiCampo id="motivo" placeholder="Qué pasó..."
        [class.resaltado]="marcas().has('motivo')" [value]="valor('motivo')">
    </div>
    <div class="mb-3.5">
      <div uiEtiqueta><b>Fecha</b><span uiPildora>Fecha</span></div>
      <input uiCampo id="fecha" type="date"
        [class.resaltado]="marcas().has('fecha')" [value]="valor('fecha')">
    </div>
    <div id="preview"
      class="bg-crema border border-dashed border-linea rounded-campo px-3.5 py-3 text-[13px] text-apagado font-mono">Elige un insumo y una cantidad para ver el efecto.</div>
    <p uiNota>En conteo, escribe la diferencia con signo. Por ejemplo, -3 quita 3 y 3 suma 3.</p>
  </section>

  <ng-container pie>
    <button uiBoton data-onclick="S.cerrar()">Cancelar</button>
    <button uiBoton="primario" id="btnGuardar" data-onclick="guardar()"
      [class.resaltado]="marcas().has('btnGuardar')">Guardar ajuste</button>
  </ng-container>

</app-marco-dialogo>
