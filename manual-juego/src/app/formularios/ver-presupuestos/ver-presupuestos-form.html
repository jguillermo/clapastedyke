<!-- Markup fiel a src/VerPresupuestosForm.html: mismos ids y clases.
     data-onclick → onclick en el export. [class.resaltado]/[value] solo actúan en el juego. -->
<app-marco-dialogo titulo="Ver presupuestos" [icono]="icono">

  <div class="card">
    <div class="grp-title">Filtros</div>
    <div class="filtros">
      <div class="field" style="margin:0">
        <div class="lab"><b>Estado</b></div>
        <select id="f_estado" data-onchange="pintar()" [class.resaltado]="marcas().has('f_estado')">
          <option value="">Todos</option><option>Pendiente</option><option>Aprobado</option>
          <option>Rechazado</option><option>Vencido</option>
        </select>
      </div>
      <div class="field ac" style="margin:0">
        <div class="lab"><b>Cliente</b></div>
        <input id="f_cliente" placeholder="Buscar cliente..." data-oninput="pintar()"
          [class.resaltado]="marcas().has('f_cliente')" [value]="valor('f_cliente')">
        <input type="hidden" id="f_cliente_id">
      </div>
      <div class="field" style="margin:0">
        <div class="lab"><b>Desde</b></div>
        <input id="f_desde" type="date" data-onchange="pintar()"
          [class.resaltado]="marcas().has('f_desde')" [value]="valor('f_desde')">
      </div>
      <div class="field" style="margin:0">
        <div class="lab"><b>Hasta</b></div>
        <input id="f_hasta" type="date" data-onchange="pintar()"
          [class.resaltado]="marcas().has('f_hasta')" [value]="valor('f_hasta')">
      </div>
    </div>
  </div>

  <div class="card">
    <div id="lista"><div class="empty">Cargando...</div></div>
  </div>

  <ng-container pie>
    <button class="btn" data-onclick="S.cerrar()">Cerrar</button>
  </ng-container>

</app-marco-dialogo>
