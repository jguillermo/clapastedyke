<!-- Rediseño Tailwind: utilities vía directivas ui. ids y data-on* intactos
     (el juego valida por id; data-onchange/oninput es herencia del contrato GAS). -->
<app-marco-dialogo titulo="Ver pedidos" [icono]="icono">

  <section uiTarjeta>
    <div uiTituloGrupo>Filtros</div>
    <div class="grid grid-cols-2 gap-2.5 mb-3">
      <div>
        <div uiEtiqueta><b>Estado</b></div>
        <select uiCampo id="f_estado" data-onchange="pintar()" [class.resaltado]="marcas().has('f_estado')">
          <option value="">Todos</option><option>Pendiente</option><option>Producción</option>
          <option>Entregado</option><option>Cancelado</option>
        </select>
      </div>
      <div class="relative">
        <div uiEtiqueta><b>Cliente</b></div>
        <input uiCampo id="f_cliente" placeholder="Buscar cliente..." data-oninput="pintar()"
          [class.resaltado]="marcas().has('f_cliente')" [value]="valor('f_cliente')">
        <input type="hidden" id="f_cliente_id">
      </div>
    </div>
  </section>

  <section uiTarjeta>
    <div id="lista"><div uiVacio>Cargando...</div></div>
  </section>

  <ng-container pie>
    <button uiBoton data-onclick="S.cerrar()">Cerrar</button>
  </ng-container>

</app-marco-dialogo>
