<!-- Rediseño Tailwind: utilities vía directivas ui. ids y data-on* intactos
     (el juego valida por id; data-onclick es herencia del contrato GAS). -->
<app-marco-dialogo titulo="Registrar compra" [icono]="icono">

  <section uiTarjeta>
    <div uiTituloGrupo>Datos de la compra</div>
    <div uiGrid="two">
      <div class="relative">
        <div uiEtiqueta><b>Proveedor</b><span uiReq>*</span><span uiPildora>Autocompletado</span></div>
        <input uiCampo id="prov_nombre" placeholder="Buscar proveedor..."
          [class.resaltado]="marcas().has('prov_nombre')" [value]="valor('prov_nombre')">
        <input type="hidden" id="proveedor_id">
      </div>
      <div>
        <div uiEtiqueta><b>Fecha</b><span uiReq>*</span><span uiPildora>Fecha</span></div>
        <input uiCampo id="fecha" type="date"
          [class.resaltado]="marcas().has('fecha')" [value]="valor('fecha')">
      </div>
    </div>
  </section>

  <section uiTarjeta>
    <div uiTituloGrupo>Líneas de la compra</div>
    <p uiSub>La cantidad va en presentaciones. Por ejemplo, 1 caja de 500 g se escribe como 1.</p>
    <div id="lineas"></div>
    <button uiBoton="mini" data-onclick="addLinea()">+ Agregar línea</button>
  </section>

  <ng-container pie>
    <button uiBoton data-onclick="S.cerrar()">Cancelar</button>
    <button uiBoton="primario" id="btnGuardar" data-onclick="guardar()"
      [class.resaltado]="marcas().has('btnGuardar')">Guardar compra</button>
  </ng-container>

</app-marco-dialogo>
