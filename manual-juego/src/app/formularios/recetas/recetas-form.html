<!-- Markup fiel a src/RecetasForm.html: mismos ids y clases.
     data-onclick/onchange → on* en el export. [class.resaltado]/[value] solo actúan en el juego. -->
<app-marco-dialogo titulo="Recetas" [icono]="icono">

  <div class="card">
    <div class="toolbar">
      <h4>Lista de recetas</h4>
      <button class="btn mini" data-onclick="nuevo()" [class.resaltado]="marcas().has('btnNuevo')">+ Nueva receta</button>
    </div>
    <div id="lista"><div class="empty">Cargando...</div></div>
  </div>

  <div class="card">
    <div class="grp-title" id="formTitulo">Nueva receta</div>
    <input type="hidden" id="id">
    <div class="two">
      <div class="field">
        <div class="lab"><b>Nombre</b><span class="req">*</span><span class="typetag">Texto</span></div>
        <input id="nombre" placeholder="Ej. Torta de chocolate"
          [class.resaltado]="marcas().has('nombre')" [value]="valor('nombre')">
      </div>
      <div class="field">
        <div class="lab"><b>Categoria</b><span class="opt">opcional</span><span class="typetag">Texto</span></div>
        <input id="categoria" placeholder="Tortas, bocaditos..."
          [class.resaltado]="marcas().has('categoria')" [value]="valor('categoria')">
      </div>
    </div>
    <div class="two">
      <div class="field">
        <div class="lab"><b>Tipo de base</b><span class="req">*</span><span class="typetag">Dropdown</span></div>
        <select id="tipo_base" data-onchange="actualizarLabelBase()" [class.resaltado]="marcas().has('tipo_base')">
          <option value="personas">Por personas</option>
          <option value="tamano">Por tamano</option>
        </select>
      </div>
      <div class="field">
        <div class="lab"><b id="labBase">Valor de la base</b><span class="req">*</span><span class="typetag">Numero</span></div>
        <input id="raciones_base" type="number" min="0" step="any" placeholder="Personas que rinde tal cual"
          [class.resaltado]="marcas().has('raciones_base')" [value]="valor('raciones_base')">
      </div>
    </div>
    <div class="field">
      <div class="lab"><b>Tiempo mano de obra</b><span class="req">*</span><span class="typetag">Numero (horas)</span></div>
      <input id="tiempo" type="number" min="0" step="any" placeholder="Ej. 1.5"
        [class.resaltado]="marcas().has('tiempo')" [value]="valor('tiempo')">
    </div>

    <div class="grp-title" style="margin-top:18px;border-top:1px dashed var(--line);padding-top:16px">Ingredientes</div>
    <div id="ings"></div>
    <button class="btn mini" data-onclick="addRow()">+ Agregar ingrediente</button>
    <div class="note">La unidad se toma sola del insumo. Las cantidades son para la base de la receta.</div>
  </div>

  <ng-container pie>
    <button class="btn" data-onclick="nuevo()">Limpiar</button>
    <button class="btn primary" id="btnGuardar" data-onclick="guardar()"
      [class.resaltado]="marcas().has('btnGuardar')">Guardar receta</button>
  </ng-container>

</app-marco-dialogo>
