<!-- Markup fiel a src/DetallePresupuestoForm.html: mismos ids y clases.
     data-onclick → onclick en el export. [class.resaltado]/[value] solo actúan en el juego. -->
<app-marco-dialogo titulo="Detalle" [icono]="icono" idTitulo="titulo" idPie="pie">

  <div id="cuerpo"><div class="empty">Cargando...</div></div>

  <ng-container pie>
    <button class="btn" data-onclick="volver()">Volver a la lista</button>
  </ng-container>

</app-marco-dialogo>
