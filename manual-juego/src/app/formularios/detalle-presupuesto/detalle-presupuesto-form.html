<!-- Rediseño Tailwind: solo chrome (uiVacio + uiBoton). ids del marco
     (idTitulo/idPie) y data-on* intactos. -->
<app-marco-dialogo titulo="Detalle" [icono]="icono" idTitulo="titulo" idPie="pie">

  <div id="cuerpo"><div uiVacio>Cargando...</div></div>

  <ng-container pie>
    <button uiBoton data-onclick="volver()">Volver a la lista</button>
  </ng-container>

</app-marco-dialogo>
