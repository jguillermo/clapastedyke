<!-- Markup fiel a src/ReglasEmpaqueForm.html: mismos ids y clases.
     data-onclick → onclick en el export. [class.resaltado]/[value] solo actúan en el juego. -->
<app-marco-dialogo titulo="Reglas de empaque" [icono]="icono">

  <div class="card">
    <div class="toolbar">
      <h4>Reglas registradas</h4>
      <button class="btn mini" data-onclick="nuevo()" [class.resaltado]="marcas().has('btnNuevo')">+ Nueva regla</button>
    </div>
    <div id="lista"><div class="empty">Cargando...</div></div>
  </div>

  <div class="card">
    <div class="grp-title" id="formTitulo">Nueva regla</div>
    <p class="sub">Define que empaque se sugiere para una receta en cierto tamano. Una receta y tamano puede tener varias filas.</p>
    <input type="hidden" id="id_regla">
    <div class="two">
      <div class="field ac">
        <div class="lab"><b>Receta</b><span class="req">*</span><span class="typetag">Autocompletado</span></div>
        <input id="rec_nombre" placeholder="Buscar receta..."
          [class.resaltado]="marcas().has('rec_nombre')" [value]="valor('rec_nombre')">
        <input type="hidden" id="receta_id">
      </div>
      <div class="field">
        <div class="lab"><b>Tamano</b><span class="req">*</span><span class="typetag">Dropdown</span></div>
        <select id="tamano" [class.resaltado]="marcas().has('tamano')"></select>
      </div>
    </div>
    <div class="two">
      <div class="field ac">
        <div class="lab"><b>Empaque</b><span class="req">*</span><span class="typetag">Autocompletado</span></div>
        <input id="emp_nombre" placeholder="Buscar empaque..."
          [class.resaltado]="marcas().has('emp_nombre')" [value]="valor('emp_nombre')">
        <input type="hidden" id="insumo_empaque_id">
      </div>
      <div class="field">
        <div class="lab"><b>Cantidad</b><span class="req">*</span><span class="typetag">Numero</span></div>
        <input id="cantidad" type="number" min="0" step="any" placeholder="Ej. 1"
          [class.resaltado]="marcas().has('cantidad')" [value]="valor('cantidad')">
      </div>
    </div>
  </div>

  <ng-container pie>
    <button class="btn" data-onclick="nuevo()">Limpiar</button>
    <button class="btn primary" id="btnGuardar" data-onclick="guardar()"
      [class.resaltado]="marcas().has('btnGuardar')">Guardar regla</button>
  </ng-container>

</app-marco-dialogo>
