<!-- Rediseño Tailwind: utilities vía directivas ui. ids y data-on* intactos
     (el juego valida por id; data-onclick es herencia del contrato GAS). -->
<app-marco-dialogo titulo="Reglas de empaque" [icono]="icono">

  <section uiTarjeta>
    <div uiToolbar>
      <h4 uiToolbarTitulo>Reglas registradas</h4>
      <button uiBoton="mini" data-onclick="nuevo()" [class.resaltado]="marcas().has('btnNuevo')">+ Nueva regla</button>
    </div>
    <div id="lista"><div uiVacio>Cargando...</div></div>
  </section>

  <section uiTarjeta>
    <div uiTituloGrupo id="formTitulo">Nueva regla</div>
    <p uiSub>Define que empaque se sugiere para una receta en cierto tamano. Una receta y tamano puede tener varias filas.</p>
    <input type="hidden" id="id_regla">
    <div uiGrid="two">
      <div class="relative">
        <div uiEtiqueta><b>Receta</b><span uiReq>*</span><span uiPildora>Autocompletado</span></div>
        <input uiCampo id="rec_nombre" placeholder="Buscar receta..."
          [class.resaltado]="marcas().has('rec_nombre')" [value]="valor('rec_nombre')">
        <input type="hidden" id="receta_id">
      </div>
      <div>
        <div uiEtiqueta><b>Tamano</b><span uiReq>*</span><span uiPildora>Dropdown</span></div>
        <select uiCampo id="tamano" [class.resaltado]="marcas().has('tamano')"></select>
      </div>
    </div>
    <div uiGrid="two">
      <div class="relative">
        <div uiEtiqueta><b>Empaque</b><span uiReq>*</span><span uiPildora>Autocompletado</span></div>
        <input uiCampo id="emp_nombre" placeholder="Buscar empaque..."
          [class.resaltado]="marcas().has('emp_nombre')" [value]="valor('emp_nombre')">
        <input type="hidden" id="insumo_empaque_id">
      </div>
      <div>
        <div uiEtiqueta><b>Cantidad</b><span uiReq>*</span><span uiPildora>Numero</span></div>
        <input uiCampo id="cantidad" type="number" min="0" step="any" placeholder="Ej. 1"
          [class.resaltado]="marcas().has('cantidad')" [value]="valor('cantidad')">
      </div>
    </div>
  </section>

  <ng-container pie>
    <button uiBoton data-onclick="nuevo()">Limpiar</button>
    <button uiBoton="primario" id="btnGuardar" data-onclick="guardar()"
      [class.resaltado]="marcas().has('btnGuardar')">Guardar regla</button>
  </ng-container>

</app-marco-dialogo>
