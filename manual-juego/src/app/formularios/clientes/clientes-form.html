<!-- Rediseño Tailwind: utilities vía directivas ui. ids y data-on* intactos
     (el juego valida por id; data-onclick es herencia del contrato GAS). -->
<app-marco-dialogo titulo="Clientes" [icono]="icono">

  <section uiTarjeta>
    <div uiToolbar>
      <h4 uiToolbarTitulo>Lista de clientes</h4>
      <button uiBoton="mini" data-onclick="nuevo()" [class.resaltado]="marcas().has('btnNuevo')">+ Nuevo cliente</button>
    </div>
    <div id="lista"><div uiVacio>Cargando...</div></div>
  </section>

  <section uiTarjeta>
    <div uiTituloGrupo id="formTitulo">Nuevo cliente</div>
    <input type="hidden" id="id">
    <div class="mb-3.5">
      <div uiEtiqueta><b>Nombre</b><span uiReq>*</span><span uiPildora>Texto</span></div>
      <input uiCampo id="nombre" placeholder="Nombre del cliente"
        [class.resaltado]="marcas().has('nombre')" [value]="valor('nombre')">
    </div>
    <div uiGrid="two">
      <div>
        <div uiEtiqueta><b>Telefono o contacto</b><span uiOpt>opcional</span><span uiPildora>Texto</span></div>
        <input uiCampo id="telefono" placeholder="Ej. 999 888 777"
          [class.resaltado]="marcas().has('telefono')" [value]="valor('telefono')">
      </div>
      <div>
        <div uiEtiqueta><b>Notas</b><span uiOpt>opcional</span><span uiPildora>Texto</span></div>
        <input uiCampo id="notas" placeholder="Referencia, direccion..."
          [class.resaltado]="marcas().has('notas')" [value]="valor('notas')">
      </div>
    </div>
  </section>

  <ng-container pie>
    <button uiBoton data-onclick="nuevo()">Limpiar</button>
    <button uiBoton="primario" id="btnGuardar" data-onclick="guardar()"
      [class.resaltado]="marcas().has('btnGuardar')">Guardar cliente</button>
  </ng-container>

</app-marco-dialogo>
