<!-- Rediseño Tailwind: utilities vía directivas ui. ids y data-on* intactos
     (el juego valida por id; data-onchange/onclick es herencia del contrato GAS). -->
<app-marco-dialogo titulo="Comprar materiales" [icono]="icono">

  <section uiTarjeta>
    <div uiGrid="two">
      <div>
        <div uiEtiqueta><b>Modo</b><span uiPildora>Dropdown</span></div>
        <select uiCampo id="modo" data-onchange="cambioModo()" [class.resaltado]="marcas().has('modo')">
          <option value="auto">Desde un pedido (faltantes)</option>
          <option value="manual">Manual (yo elijo)</option>
        </select>
      </div>
      <div id="boxPedido">
        <div uiEtiqueta><b>Pedido</b><span uiPildora>Dropdown</span></div>
        <select uiCampo id="pedido" data-onchange="generarAuto()" [class.resaltado]="marcas().has('pedido')"></select>
      </div>
    </div>
  </section>

  <section uiTarjeta id="boxManual" style="display:none">
    <div uiTituloGrupo>Elige insumos y cantidad</div>
    <p uiSub>Los que están bajo el mínimo vienen marcados.</p>
    <div id="listaManual"></div>
    <button uiBoton="mini" data-onclick="generarManual()">Generar lista</button>
  </section>

  <section uiTarjeta>
    <div uiTituloGrupo>Lista por proveedor</div>
    <div id="resultado"><div uiVacio>Elige un pedido o arma la lista manual.</div></div>
  </section>

  <ng-container pie>
    <button uiBoton data-onclick="S.cerrar()">Cerrar</button>
    <button uiBoton="primario" data-onclick="irRegistrar()">Registrar una compra</button>
  </ng-container>

</app-marco-dialogo>
