<!-- Rediseño Tailwind: utilities vía directivas ui. ids y data-on* intactos
     (el juego valida por id; data-onclick es herencia del contrato GAS). -->
<app-marco-dialogo titulo="Proveedores" [icono]="icono">

  <section uiTarjeta>
    <div uiToolbar>
      <h4 uiToolbarTitulo>Lista de proveedores</h4>
      <button uiBoton="mini" data-onclick="nuevo()" [class.resaltado]="marcas().has('btnNuevo')">+ Nuevo proveedor</button>
    </div>
    <div id="lista"><div uiVacio>Cargando...</div></div>
  </section>

  <section uiTarjeta>
    <div uiTituloGrupo id="formTitulo">Nuevo proveedor</div>
    <input type="hidden" id="id">
    <div uiGrid="two">
      <div>
        <div uiEtiqueta><b>Nombre</b><span uiReq>*</span><span uiPildora>Texto</span></div>
        <input uiCampo id="nombre" placeholder="Nombre del proveedor"
          [class.resaltado]="marcas().has('nombre')" [value]="valor('nombre')">
      </div>
      <div>
        <div uiEtiqueta><b>WhatsApp</b><span uiReq>*</span><span uiPildora>Numero</span></div>
        <input uiCampo id="whatsapp" placeholder="51999888777 (con codigo de pais)"
          [class.resaltado]="marcas().has('whatsapp')" [value]="valor('whatsapp')">
      </div>
    </div>
    <div class="mt-3.5">
      <div uiEtiqueta><b>Notas</b><span uiOpt>opcional</span><span uiPildora>Texto</span></div>
      <textarea uiCampo id="notas" rows="3" placeholder="Productos que vende, horarios..."
        [class.resaltado]="marcas().has('notas')"></textarea>
    </div>
  </section>

  <ng-container pie>
    <button uiBoton data-onclick="nuevo()">Limpiar</button>
    <button uiBoton="primario" id="btnGuardar" data-onclick="guardar()"
      [class.resaltado]="marcas().has('btnGuardar')">Guardar proveedor</button>
  </ng-container>

</app-marco-dialogo>
