<migo-card fill>
  <migo-card-header>
    <migo-icon card-icon name="mat:layers" size="lg" color="brand" />
    <migo-card-title>{{ copy.title }}</migo-card-title>
  </migo-card-header>

  <migo-card-body>
    <form class="flex flex-col gap-5" [formGroup]="form" (ngSubmit)="save()">
      <migo-form-field label="Nombre" required reserveMessage [error]="nameError()">
        <migo-input formControlName="name" placeholder="Manjar blanco" />
      </migo-form-field>

      <div class="flex flex-col gap-2">
        <span class="font-body text-sm font-semibold text-body">¿Para cuánto rinde?</span>
        <migo-select-tag [types]="weightTypes()" (valueChange)="onChars($event)" [ariaLabel]="copy.ariaChars" />
        @if (weightError()) {
          <p class="m-0 text-caption font-medium text-error" role="alert">{{ weightError() }}</p>
        }
      </div>

      <app-ingredient-grid [ingredients]="ingredientOptions" />

      @if (errorMessage()) {
        <p class="m-0 text-caption font-medium text-error" role="alert">{{ errorMessage() }}</p>
      }
    </form>
  </migo-card-body>

  <migo-card-footer>
    <button migo-button variant="ghost" type="button" (click)="cancel()">Cancelar</button>
    <button migo-button type="button" [loading]="saving()" (click)="save()">{{ copy.saveLabel }}</button>
  </migo-card-footer>
</migo-card>
