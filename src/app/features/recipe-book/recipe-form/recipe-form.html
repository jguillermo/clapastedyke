<migo-card fill>
  <migo-card-header>
    <migo-icon card-icon name="mat:layers" size="lg" color="brand" />
    <migo-card-title>{{ title }}</migo-card-title>
    <migo-card-subtitle>{{ category.name }}</migo-card-subtitle>
  </migo-card-header>

  <migo-card-body>
    <form class="flex flex-col gap-5" [formGroup]="form" (ngSubmit)="save()">
      <migo-form-field
        label="Nombre"
        required
        reserveMessage
        [error]="nameError()"
        [hint]="editing ? 'El nombre no se puede cambiar al editar.' : ''"
      >
        <migo-input formControlName="name" placeholder="Nombre de la receta" />
      </migo-form-field>

      <app-ingredient-grid [ingredients]="ingredientOptions" [initialLines]="initialLines" />

      @if (errorMessage()) {
        <p class="m-0 text-caption font-medium text-error" role="alert">{{ errorMessage() }}</p>
      }

      @if (hasProperties) {
        <div class="flex flex-col gap-2">
          <span class="font-body text-sm font-semibold text-body">Propiedades</span>
          <migo-select-tag
            [types]="charTypes()"
            [value]="initialChars"
            (valueChange)="onChars($event)"
            ariaLabel="Propiedades de la receta"
          />
          @if (charsError()) {
            <p class="m-0 text-caption font-medium text-error" role="alert">{{ charsError() }}</p>
          }
        </div>
      }
    </form>
  </migo-card-body>

  <migo-card-footer>
    <button migo-button variant="ghost" type="button" (click)="cancel()">Cancelar</button>
    <button migo-button type="button" [loading]="saving()" (click)="save()">{{ saveLabel }}</button>
  </migo-card-footer>
</migo-card>
