<!-- Tailwind redesign: utilities via ui directives. ids and data-on* intact
     (the game validates by id; data-onchange/oninput is inherited from the GAS contract).
     All visible texts are transloco keys under scope formsSales.ordersList.* -->
<app-dialog-frame title="formsSales.ordersList.title" [icon]="icon">

  <section uiCard>
    <div uiGroupTitle>{{ 'formsSales.ordersList.filters' | transloco }}</div>
    <div class="grid grid-cols-2 gap-2.5 mb-3">
      <div>
        <div uiLabel><b>{{ 'formsSales.ordersList.status' | transloco }}</b></div>
        <select uiField id="f_estado" data-onchange="pintar()" [class.highlighted]="marks().has('f_estado')">
          <option value="">{{ 'formsSales.ordersList.statusAll' | transloco }}</option><option>{{ 'formsSales.ordersList.statusPending' | transloco }}</option><option>{{ 'formsSales.ordersList.statusProduction' | transloco }}</option>
          <option>{{ 'formsSales.ordersList.statusDelivered' | transloco }}</option><option>{{ 'formsSales.ordersList.statusCancelled' | transloco }}</option>
        </select>
      </div>
      <div class="relative">
        <div uiLabel><b>{{ 'formsSales.ordersList.customer' | transloco }}</b></div>
        <input uiField id="f_cliente" [placeholder]="'formsSales.ordersList.customerPlaceholder' | transloco" data-oninput="pintar()"
          [class.highlighted]="marks().has('f_cliente')" [value]="value('f_cliente')">
        <input type="hidden" id="f_cliente_id">
      </div>
    </div>
  </section>

  <section uiCard>
    <div id="lista"><div uiEmpty>{{ 'formsSales.ordersList.loading' | transloco }}</div></div>
  </section>

  <ng-container footer>
    <button uiButton data-onclick="S.cerrar()">{{ 'formsSales.ordersList.close' | transloco }}</button>
  </ng-container>

</app-dialog-frame>
