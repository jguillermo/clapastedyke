  }catch(e){}
})();

</script>

<div class="dlg-head"><div class="dlg-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="dlg-ico draw"><rect x="6" y="4" width="12" height="17" rx="2"></rect><path d="M9 3h6v3H9z"></path><path d="M9 11h6M9 15h4"></path></svg><h3>Recetas</h3></div><button onclick="S.cerrar()" title="Cerrar" class="x">×</button></div><div class="dlg-body"><div id="flash" class="flash"></div><div class="card"><div class="toolbar"><h4>Lista de recetas</h4><button onclick="nuevo()" class="btn mini">+ Nueva receta</button></div><div id="lista"><div class="empty">Cargando...</div></div></div><div class="card"><div id="formTitulo" class="grp-title">Nueva receta</div><input type="hidden" id="id"><div class="two"><div class="field"><div class="lab"><b>Nombre</b><span class="req">*</span><span class="typetag">Texto</span></div><input id="nombre" placeholder="Ej. Torta de chocolate"></div><div class="field"><div class="lab"><b>Categoria</b><span class="opt">opcional</span><span class="typetag">Texto</span></div><input id="categoria" placeholder="Tortas, bocaditos..."></div></div><div class="two"><div class="field"><div class="lab"><b>Tipo de base</b><span class="req">*</span><span class="typetag">Dropdown</span></div><select id="tipo_base" onchange="actualizarLabelBase()"><option value="personas">Por personas</option><option value="tamano">Por tamano</option></select></div><div class="field"><div class="lab"><b id="labBase">Valor de la base</b><span class="req">*</span><span class="typetag">Numero</span></div><input id="raciones_base" type="number" min="0" step="any" placeholder="Personas que rinde tal cual"></div></div><div class="field"><div class="lab"><b>Tiempo mano de obra</b><span class="req">*</span><span class="typetag">Numero (horas)</span></div><input id="tiempo" type="number" min="0" step="any" placeholder="Ej. 1.5"></div><div class="grp-title" style="margin-top: 18px; border-top: 1px dashed var(--line); padding-top: 16px;">Ingredientes</div><div id="ings"></div><button onclick="addRow()" class="btn mini">+ Agregar ingrediente</button><div class="note">La unidad se toma sola del insumo. Las cantidades son para la base de la receta.</div></div></div><div class="dlg-foot"><button onclick="nuevo()" class="btn">Limpiar</button><button id="btnGuardar" onclick="guardar()" class="btn primary">Guardar receta</button></div>

<script>
// Copia EXACTA del objeto S de src/Estilos.html. NO editar sin sincronizar con el export.
// Ayudantes compartidos.
var S = {
  esc: function(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); },
  money: function(n){ n=Number(n)||0; return 'S/ '+n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2}); },
  num4: function(n){ n=Number(n)||0; return n.toLocaleString('es-PE',{minimumFractionDigits:4,maximumFractionDigits:4}); },
  flash: function(msg,tipo){
    var el=document.getElementById('flash'); if(!el) return;
    el.textContent=msg; el.className='flash show '+(tipo||'ok');
    if(tipo==='ok'){ setTimeout(function(){ el.className='flash'; },4000); }
    el.scrollIntoView({block:'nearest'});
  },
  cerrar: function(){ google.script.host.close(); },
  confirmar: function(msg){ return window.confirm(msg); },
  bad: function(el,on){ if(el) el.classList.toggle('bad',!!on); },
  // Llama a una funcion del servidor. onOk(resultado), onErr(error).
  call: function(fn,arg,onOk,onErr){
    google.script.run
      .withSuccessHandler(function(r){ if(onOk) onOk(r); })
      .withFailureHandler(function(e){ if(onErr) onErr(e); else S.flash(e.message||String(e),'err'); })
      [fn](arg);
  },
  // Autocompletado simple sobre una lista [{id,nombre}].
  autocomplete: function(input, hidden, items, onPick){
    var box=document.createElement('div'); box.className='ac-list';
    input.parentNode.appendChild(box);
    function render(txt){
      var t=(txt||'').toLowerCase();
      var res=items.filter(function(i){ return i.nombre.toLowerCase().indexOf(t)>=0; }).slice(0,30);
      if(!res.length){ box.innerHTML='<div class="ac-empty">Sin coincidencias</div>'; box.classList.add('show'); return; }
      box.innerHTML=res.map(function(i){ return '<div class="ac-item" data-id="'+S.esc(i.id)+'">'+S.esc(i.nombre)+'</div>'; }).join('');
      box.classList.add('show');
      Array.prototype.forEach.call(box.querySelectorAll('.ac-item'),function(d){
        d.onclick=function(){
          var it=items.filter(function(x){ return String(x.id)===d.getAttribute('data-id'); })[0];
          input.value=it.nombre; if(hidden) hidden.value=it.id; box.classList.remove('show');
          S.bad(input,false); if(onPick) onPick(it);
        };
      });
    }
    input.addEventListener('focus',function(){ render(input.value); });
    input.addEventListener('input',function(){ if(hidden) hidden.value=''; render(input.value); });
    input.addEventListener('blur',function(){ setTimeout(function(){ box.classList.remove('show'); },180); });
  },
  // Motor de fluidez: revelado de tarjetas (una sola vez) y barra de progreso.
  // El ocultado inicial lo hizo html.fx-anim antes de pintar; si esto no corre,
  // el failsafe quita fx-anim y todo queda visible.
  fx: function(){
    if(S._fx) return; S._fx=true;
    var root=document.documentElement;
    // Sin DOM real (p. ej. tests bajo Node): no hace nada.
    if(!root || !document.body || typeof document.body.insertBefore!=='function') return;
    var body=document.querySelector('.dlg-body');
    // anim solo si html.fx-anim fue activado en <head> (false con reduce-motion / sin JS)
    var anim = (root.className||'').indexOf('fx-anim')>=0;

    // Barra de progreso ligada al scroll del cuerpo (solo si hay desbordamiento)
    var bar=document.createElement('div'); bar.className='dlg-progress';
    var fill=document.createElement('i'); bar.appendChild(fill);
    document.body.insertBefore(bar, document.body.firstChild);
    function prog(){
      if(!body) return;
      var max=body.scrollHeight-body.clientHeight;
      if(max>4){ bar.classList.add('on'); fill.style.width=(body.scrollTop/max*100)+'%'; }
      else bar.classList.remove('on');
    }
    if(body) body.addEventListener('scroll',prog);
    window.addEventListener('resize',prog);
    setTimeout(prog,80);

    if(!anim || !body) return; // sin animacion: todo ya visible

    // Marca de stagger en las tarjetas (el ocultado ya lo puso html.fx-anim antes de pintar)
    var i=0;
    Array.prototype.forEach.call(body.querySelectorAll('.card'),function(el){
      if(!el.style.getPropertyValue('--i')) el.style.setProperty('--i', Math.min(i++,4));
    });

    // Revela UNA sola vez al entrar en vista (no se repite tras reflujos de fuentes)
    var sel='.card, .reveal, .steps li';
    if(!('IntersectionObserver' in window)){
      Array.prototype.forEach.call(body.querySelectorAll(sel),function(el){ el.classList.add('is-in'); });
      return;
    }
    var io=new IntersectionObserver(function(ents){
      ents.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('is-in'); io.unobserve(e.target); } });
    }, { root: body, rootMargin:'0px 0px -8% 0px', threshold:.02 });
    Array.prototype.forEach.call(body.querySelectorAll(sel),function(el){ io.observe(el); });
  }
};
if(document.readyState!=='loading'){ S.fx(); }
else document.addEventListener('DOMContentLoaded', function(){ S.fx(); });

</script>
<script>
/* PREVIEW SHIM — copia EXACTA del de scripts/render-preview.js.
   Inerte en GAS real (detecta window.google.script); en preview/juego evita
   errores de google.script.*. */
(function () {
  if (window.google && window.google.script) return;
  var noop = function () {};
  var chain = {};
  ['withSuccessHandler', 'withFailureHandler', 'withUserObject'].forEach(function (k) {
    chain[k] = function () { return runProxy; };
  });
  var runProxy = new Proxy(chain, {
    get: function (t, p) { return (p in t) ? t[p] : noop; } // funciones de servidor: sin datos en preview
  });
  window.google = {
    script: {
      run: runProxy,
      host: { close: noop, setWidth: noop, setHeight: noop, origin: '' },
      url:  { getLocation: function (cb) { if (cb) cb({ parameter: {} }); } }
    }
  };
})();

<script>
// Copia EXACTA del <script> propio de src/RecetasForm.html. NO editar sin sincronizar.
  var datos=[], insumos=[], rowId=0;

  function actualizarLabelBase(){
    var tipo=document.getElementById('tipo_base').value;
    var lab=document.getElementById('labBase'), inp=document.getElementById('raciones_base');
    if(tipo==='tamano'){ lab.textContent='Tamano base (referencia)'; inp.placeholder='Valor de referencia del tamano base'; }
    else { lab.textContent='Personas base'; inp.placeholder='Personas que rinde tal cual'; }
  }

  function cargar(){
    S.call('catalogoInsumos','ingrediente',function(r){
      // se permiten todos los insumos como ingrediente, no solo tipo ingrediente
      S.call('catalogoInsumos',null,function(all){ insumos=all||[]; });
    });
    S.call('listarRecetas',null,function(r){ datos=r||[]; pintar(); });
  }
  function pintar(){
    var c=document.getElementById('lista');
    if(!datos.length){ c.innerHTML='<div class="empty">Aun no hay recetas.</div>'; return; }
    var f='<table class="t"><tr><th>Receta</th><th>Categoria</th><th class="n">Raciones</th>'
        + '<th class="n">Ingred.</th><th></th></tr>';
    datos.forEach(function(d){
      f+='<tr><td>'+S.esc(d.nombre)+'</td><td>'+S.esc(d.categoria)+'</td>'
       + '<td class="n">'+d.raciones_base+'</td><td class="n">'+d.ingredientes.length+'</td>'
       + '<td class="n"><button class="btn mini" onclick="editar(\''+d.id+'\')">Editar</button></td></tr>';
    });
    c.innerHTML=f+'</table>';
  }
  function addRow(ing){
    rowId++;
    var wrap=document.createElement('div');
    wrap.className='row-add'; wrap.style.gridTemplateColumns='1.6fr .9fr .6fr auto';
    wrap.id='row'+rowId;
    wrap.innerHTML=
      '<div class="ac"><input placeholder="Buscar insumo..." id="in'+rowId+'">'
      + '<input type="hidden" id="inid'+rowId+'"></div>'
      + '<input type="number" min="0" step="any" placeholder="Cantidad" id="cant'+rowId+'">'
      + '<input class="ro" readonly placeholder="unidad" id="uni'+rowId+'">'
      + '<button class="btn mini no" onclick="this.parentNode.remove()">Quitar</button>';
    document.getElementById('ings').appendChild(wrap);
    var input=document.getElementById('in'+rowId), hid=document.getElementById('inid'+rowId),
        uni=document.getElementById('uni'+rowId);
    S.autocomplete(input,hid,insumos.map(function(i){ return {id:i.id,nombre:i.nombre}; }),function(it){
      var full=insumos.filter(function(x){ return String(x.id)===String(it.id); })[0];
      uni.value=full?(full.unidad_base==='u'?'unidad':'gramo'):'';
    });
    if(ing){
      input.value=ing.insumo_nombre||''; hid.value=ing.insumo_id||'';
      document.getElementById('cant'+rowId).value=ing.cantidad_base||'';
      uni.value=(ing.unidad==='u'?'unidad':(ing.unidad?'gramo':''));
    }
  }
  function nuevo(){
    document.getElementById('id').value='';
    ['nombre','categoria','raciones_base','tiempo'].forEach(function(k){ document.getElementById(k).value=''; });
    document.getElementById('tipo_base').value='personas'; actualizarLabelBase();
    document.getElementById('ings').innerHTML=''; addRow();
    document.getElementById('formTitulo').textContent='Nueva receta';
    document.getElementById('nombre').focus();
  }
  function editar(id){
    var d=datos.filter(function(x){ return String(x.id)===String(id); })[0]; if(!d) return;
    document.getElementById('id').value=d.id;
    document.getElementById('nombre').value=d.nombre||'';
    document.getElementById('categoria').value=d.categoria||'';
    document.getElementById('tipo_base').value=d.tipo_base||'personas'; actualizarLabelBase();
    document.getElementById('raciones_base').value=d.raciones_base||'';
    document.getElementById('tiempo').value=d.tiempo_mano_obra_horas||'';
    document.getElementById('ings').innerHTML='';
    (d.ingredientes||[]).forEach(function(g){ addRow(g); });
    if(!d.ingredientes||!d.ingredientes.length) addRow();
    document.getElementById('formTitulo').textContent='Editar receta';
    window.scrollTo(0,document.body.scrollHeight);
  }
  function recogerIngredientes(){
    var res=[];
    Array.prototype.forEach.call(document.querySelectorAll('#ings .row-add'),function(row){
      var idn=row.querySelector('input[type=hidden]').value;
      var cant=row.querySelector('input[type=number]').value;
      if(idn && Number(cant)>0) res.push({insumo_id:idn, cantidad_base:cant});
    });
    return res;
  }
  function guardar(){
    var n=document.getElementById('nombre'), rb=document.getElementById('raciones_base'),
        tm=document.getElementById('tiempo');
    var ok=true;
    S.bad(n,!n.value.trim()); if(!n.value.trim()) ok=false;
    S.bad(rb,!(Number(rb.value)>0)); if(!(Number(rb.value)>0)) ok=false;
    S.bad(tm,!(tm.value!==''&&Number(tm.value)>=0)); if(!(tm.value!==''&&Number(tm.value)>=0)) ok=false;
    var ings=recogerIngredientes();
    if(!ings.length){ ok=false; S.flash('Agrega al menos un ingrediente con cantidad.','err'); }
    if(!ok){ if(n.value.trim()&&Number(rb.value)>0) {} else S.flash('Revisa los campos marcados.','err'); return; }
    var btn=document.getElementById('btnGuardar'); btn.disabled=true;
    S.call('guardarReceta',{
      id:document.getElementById('id').value, nombre:n.value,
      categoria:document.getElementById('categoria').value,
      tipo_base:document.getElementById('tipo_base').value,
      raciones_base:rb.value, tiempo_mano_obra_horas:tm.value, ingredientes:ings
    }, function(r){ S.cerrar(); },
       function(e){ btn.disabled=false; S.flash(e.message||String(e),'err'); });
  }
  cargar(); addRow(); actualizarLabelBase();

</script>
