<base target="_top">
<?!= include('Estilos'); ?>
</head>
<body>

<div class="dlg-head">
  <h3>Clientes</h3>
  <button class="x" onclick="S.cerrar()" title="Cerrar">&times;</button>
</div>

<div class="dlg-body">
  <div id="flash" class="flash"></div>

  <div class="card">
    <div class="toolbar">
      <h4>Lista de clientes</h4>
      <button class="btn mini" onclick="nuevo()">+ Nuevo cliente</button>
    </div>
    <div id="lista"><div class="empty">Cargando...</div></div>
  </div>

  <div class="card">
    <div class="grp-title" id="formTitulo">Nuevo cliente</div>
    <input type="hidden" id="id">
    <div class="field">
      <div class="lab"><b>Nombre</b><span class="req">*</span><span class="typetag">Texto</span></div>
      <input id="nombre" placeholder="Nombre del cliente">
    </div>
    <div class="two">
      <div class="field">
        <div class="lab"><b>Telefono o contacto</b><span class="opt">opcional</span><span class="typetag">Texto</span></div>
        <input id="telefono" placeholder="Ej. 999 888 777">
      </div>
      <div class="field">
        <div class="lab"><b>Notas</b><span class="opt">opcional</span><span class="typetag">Texto</span></div>
        <input id="notas" placeholder="Referencia, direccion...">
      </div>
    </div>
  </div>
</div>

<div class="dlg-foot">
  <button class="btn" onclick="nuevo()">Limpiar</button>
  <button class="btn primary" id="btnGuardar" onclick="guardar()">Guardar cliente</button>
</div>

<script>
  var datos = [];

  function cargar(){
    S.call('listarClientes', null, function(r){ datos=r||[]; pintar(); });
  }
  function pintar(){
    var c=document.getElementById('lista');
    if(!datos.length){ c.innerHTML='<div class="empty">Aun no hay clientes. Crea el primero abajo.</div>'; return; }
    var f='<table class="t"><tr><th>Nombre</th><th>Contacto</th><th>Notas</th><th></th></tr>';
    datos.forEach(function(d){
      f+='<tr><td>'+S.esc(d.nombre)+'</td><td>'+S.esc(d.telefono)+'</td><td>'+S.esc(d.notas)+'</td>'
       + '<td class="n"><button class="btn mini" onclick="editar(\''+d.id+'\')">Editar</button></td></tr>';
    });
    c.innerHTML=f+'</table>';
  }
  function nuevo(){
    document.getElementById('id').value='';
    document.getElementById('nombre').value='';
    document.getElementById('telefono').value='';
    document.getElementById('notas').value='';
    document.getElementById('formTitulo').textContent='Nuevo cliente';
    S.bad(document.getElementById('nombre'),false);
    document.getElementById('nombre').focus();
  }
  function editar(id){
    var d=datos.filter(function(x){ return String(x.id)===String(id); })[0]; if(!d) return;
    document.getElementById('id').value=d.id;
    document.getElementById('nombre').value=d.nombre||'';
    document.getElementById('telefono').value=d.telefono||'';
    document.getElementById('notas').value=d.notas||'';
    document.getElementById('formTitulo').textContent='Editar cliente';
    window.scrollTo(0,document.body.scrollHeight);
  }
  function guardar(){
    var nombre=document.getElementById('nombre');
    if(!nombre.value.trim()){ S.bad(nombre,true); S.flash('El nombre es obligatorio.','err'); return; }
    var btn=document.getElementById('btnGuardar'); btn.disabled=true;
    S.call('guardarCliente', {
      id: document.getElementById('id').value,
      nombre: nombre.value, telefono: document.getElementById('telefono').value,
      notas: document.getElementById('notas').value
    }, function(r){ S.cerrar(); },
       function(e){ btn.disabled=false; S.flash(e.message||String(e),'err'); });
  }
  cargar();
</script>
</body>
</html>
