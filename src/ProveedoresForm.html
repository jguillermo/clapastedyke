<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<base target="_top">
<?!= include('Estilos'); ?>
</head>
<body>

<div class="dlg-head">
  <div class="dlg-title">
    <svg class="dlg-ico draw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h13v9H2z"/><path d="M15 9h4l3 3v3h-7z"/><circle cx="7" cy="18" r="1.7"/><circle cx="17" cy="18" r="1.7"/></svg>
    <h3>Proveedores</h3>
  </div>
  <button class="x" onclick="S.cerrar()" title="Cerrar">&times;</button>
</div>

<div class="dlg-body">
  <div id="flash" class="flash"></div>

  <div class="card">
    <div class="toolbar">
      <h4>Lista de proveedores</h4>
      <button class="btn mini" onclick="nuevo()">+ Nuevo proveedor</button>
    </div>
    <div id="lista"><div class="empty">Cargando...</div></div>
  </div>

  <div class="card">
    <div class="grp-title" id="formTitulo">Nuevo proveedor</div>
    <input type="hidden" id="id">
    <div class="two">
      <div class="field">
        <div class="lab"><b>Nombre</b><span class="req">*</span><span class="typetag">Texto</span></div>
        <input id="nombre" placeholder="Nombre del proveedor">
      </div>
      <div class="field">
        <div class="lab"><b>WhatsApp</b><span class="req">*</span><span class="typetag">Numero</span></div>
        <input id="whatsapp" placeholder="51999888777 (con codigo de pais)">
      </div>
    </div>
    <div class="field">
      <div class="lab"><b>Notas</b><span class="opt">opcional</span><span class="typetag">Texto</span></div>
      <textarea id="notas" placeholder="Productos que vende, horarios..."></textarea>
    </div>
  </div>
</div>

<div class="dlg-foot">
  <button class="btn" onclick="nuevo()">Limpiar</button>
  <button class="btn primary" id="btnGuardar" onclick="guardar()">Guardar proveedor</button>
</div>

<script>
  var datos=[];
  function cargar(){ S.call('listarProveedores',null,function(r){ datos=r||[]; pintar(); }); }
  function pintar(){
    var c=document.getElementById('lista');
    if(!datos.length){ c.innerHTML='<div class="empty">Aun no hay proveedores.</div>'; return; }
    var f='<table class="t"><tr><th>Nombre</th><th>WhatsApp</th><th>Notas</th><th></th></tr>';
    datos.forEach(function(d){
      f+='<tr><td>'+S.esc(d.nombre)+'</td><td class="num">'+S.esc(d.whatsapp)+'</td><td>'+S.esc(d.notas)+'</td>'
       + '<td class="n"><button class="btn mini" onclick="editar(\''+d.id+'\')">Editar</button></td></tr>';
    });
    c.innerHTML=f+'</table>';
  }
  function nuevo(){
    ['id','nombre','whatsapp','notas'].forEach(function(k){ document.getElementById(k).value=''; });
    document.getElementById('formTitulo').textContent='Nuevo proveedor';
    document.getElementById('nombre').focus();
  }
  function editar(id){
    var d=datos.filter(function(x){ return String(x.id)===String(id); })[0]; if(!d) return;
    document.getElementById('id').value=d.id;
    document.getElementById('nombre').value=d.nombre||'';
    document.getElementById('whatsapp').value=d.whatsapp||'';
    document.getElementById('notas').value=d.notas||'';
    document.getElementById('formTitulo').textContent='Editar proveedor';
    window.scrollTo(0,document.body.scrollHeight);
  }
  function guardar(){
    var nombre=document.getElementById('nombre'), wa=document.getElementById('whatsapp');
    var ok=true;
    if(!nombre.value.trim()){ S.bad(nombre,true); ok=false; } else S.bad(nombre,false);
    if(!wa.value.trim()){ S.bad(wa,true); ok=false; } else S.bad(wa,false);
    if(!ok){ S.flash('Completa los campos marcados.','err'); return; }
    var btn=document.getElementById('btnGuardar'); btn.disabled=true;
    S.call('guardarProveedor',{
      id:document.getElementById('id').value, nombre:nombre.value,
      whatsapp:wa.value, notas:document.getElementById('notas').value
    }, function(r){ S.cerrar(); },
       function(e){ btn.disabled=false; S.flash(e.message||String(e),'err'); });
  }
  cargar();
</script>
</body>
</html>
