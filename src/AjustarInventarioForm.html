<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<base target="_top">
<?!= include('Estilos'); ?>
<style>
  .prev{background:#fbf6ef;border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-top:6px;font-size:14px}
  .prev .num{font-family:"Space Mono",monospace;font-weight:700}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-left:6px}
  .dot.rojo{background:var(--red)} .dot.amarillo{background:var(--amber)} .dot.verde{background:var(--green)}
</style>
</head>
<body>

<div class="dlg-head">
  <div class="dlg-title">
    <svg class="dlg-ico draw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h16"/><circle cx="9" cy="7" r="2.2"/><circle cx="15" cy="12" r="2.2"/><circle cx="8" cy="17" r="2.2"/></svg>
    <h3>Ajustar inventario</h3>
  </div>
  <button class="x" onclick="S.cerrar()" title="Cerrar">&times;</button>
</div>

<div class="dlg-body">
  <div id="flash" class="flash"></div>

  <div class="card">
    <div class="grp-title">Mermas y ajustes</div>
    <div class="field ac">
      <div class="lab"><b>Insumo</b><span class="req">*</span><span class="typetag">Autocompletado</span></div>
      <input id="ins_nombre" placeholder="Buscar insumo...">
      <input type="hidden" id="insumo_id">
    </div>
    <div class="two">
      <div class="field">
        <div class="lab"><b>Tipo de ajuste</b><span class="req">*</span><span class="typetag">Dropdown</span></div>
        <select id="tipo" onchange="prev()"></select>
      </div>
      <div class="field">
        <div class="lab"><b>Cantidad</b><span class="req">*</span><span class="typetag">Número</span></div>
        <input id="cantidad" type="number" step="any" placeholder="Ej. 200" oninput="prev()">
      </div>
    </div>
    <div class="field">
      <div class="lab"><b>Motivo</b><span class="opt">recomendado en mermas</span><span class="typetag">Texto</span></div>
      <input id="motivo" placeholder="Qué pasó...">
    </div>
    <div class="field">
      <div class="lab"><b>Fecha</b><span class="typetag">Fecha</span></div>
      <input id="fecha" type="date">
    </div>
    <div class="prev" id="preview">Elige un insumo y una cantidad para ver el efecto.</div>
    <div class="sub" style="margin-top:8px">En conteo, escribe la diferencia con signo. Por ejemplo, -3 quita 3 y 3 suma 3.</div>
  </div>
</div>

<div class="dlg-foot">
  <button class="btn" onclick="S.cerrar()">Cancelar</button>
  <button class="btn primary" id="btnGuardar" onclick="guardar()">Guardar ajuste</button>
</div>

<script>
  var insumos=[];
  function cargar(){
    S.call('datosAjustarInventario', null, function(d){
      insumos=d.insumos||[];
      document.getElementById('tipo').innerHTML=(d.tipos||[]).map(function(t){
        return '<option value="'+S.esc(t)+'">'+S.esc(t)+'</option>'; }).join('');
      S.autocomplete(document.getElementById('ins_nombre'), document.getElementById('insumo_id'),
                     insumos.map(function(i){ return {id:i.id,nombre:i.nombre}; }), function(){ prev(); });
    });
    document.getElementById('fecha').value=new Date().toISOString().slice(0,10);
  }

  function prev(){
    var id=document.getElementById('insumo_id').value;
    var cant=document.getElementById('cantidad').value;
    if(!id || !(Number(cant)!==0)){ document.getElementById('preview').textContent='Elige un insumo y una cantidad para ver el efecto.'; return; }
    google.script.run.withSuccessHandler(function(r){
      document.getElementById('preview').innerHTML=
        'Stock: <span class="num">'+r.antes+'</span> '+S.esc(r.unidad)+
        ' → <span class="num">'+r.despues+'</span> '+S.esc(r.unidad)+
        ' <span class="dot '+r.semaforo+'"></span>';
    }).withFailureHandler(function(){}).previsualizarAjuste(id, document.getElementById('tipo').value, cant);
  }

  function guardar(){
    var id=document.getElementById('insumo_id').value;
    var cant=document.getElementById('cantidad').value;
    if(!id){ S.bad(document.getElementById('ins_nombre'),true); S.flash('Elige un insumo.','err'); return; }
    S.bad(document.getElementById('ins_nombre'),false);
    if(!(Number(cant)!==0)){ S.flash('La cantidad no puede ser cero.','err'); return; }
    if(!S.confirmar('¿Guardar este ajuste de inventario? Moverá el stock del insumo.')) return;
    var btn=document.getElementById('btnGuardar'); btn.disabled=true;
    S.call('ajustarInventario', {
      insumo_id:id, tipo:document.getElementById('tipo').value, cantidad:cant,
      motivo:document.getElementById('motivo').value, fecha:document.getElementById('fecha').value
    }, function(r){ S.cerrar(); },
       function(e){ btn.disabled=false; S.flash(e.message||String(e),'err'); });
  }

  cargar();
</script>
</body>
</html>
