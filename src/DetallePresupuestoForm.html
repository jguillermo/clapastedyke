<script>
// Copia EXACTA del bootstrap de src/Estilos.html (va en <head>, sincrono, antes de pintar).
// Oculta los estados iniciales ANTES de pintar (evita el parpadeo desaparecer/reaparecer).
// Sincrono y en <head>: corre antes de que el cuerpo se pinte. Solo si hay movimiento permitido.
(function(){
  try{
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(!reduce){
      document.documentElement.className += ' fx-anim';
      // Failsafe: si el motor no corre en 4s, no dejes nada oculto.
      setTimeout(function(){
        if(!(window.S && S._fx)){
          document.documentElement.className =
            document.documentElement.className.replace(/\s*\bfx-anim\b/,'');
        }
      }, 4000);
    }
  }catch(e){}
})();

</script>

<body class="gas-form">

<div class="dlg-head"><div class="dlg-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="dlg-ico draw"><path d="M5 3h9l4 4v8"></path><path d="M5 3v18h7"></path><path d="M9 9h5M9 13h3"></path><circle cx="16" cy="17" r="3"></circle><path d="M18.2 19.2L21 22"></path></svg><h3 id="titulo">Detalle</h3></div><button onclick="S.cerrar()" title="Cerrar" class="x">×</button></div><div class="dlg-body"><div id="flash" class="flash"></div><div id="cuerpo"><div class="empty">Cargando...</div></div></div><div class="dlg-foot" id="pie"><button onclick="volver()" class="btn">Volver a la lista</button></div>

<script>
// Copia EXACTA del objeto S de src/Estilos.html. NO editar sin sincronizar con el export.
// Ayudantes compartidos.
var S = {
  esc: function(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); },
  money: function(n){ n=Number(n)||0; return 'S/ '+n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2}); },
  num4: function(n){ n=Number(n)||0; return n.toLocaleString('es-PE',{minimumFractionDigits:4,maximumFractionDigits:4}); },
  flash: function(msg,tipo){
    var el=document.getElementById('flash'); if(!el) return;
    el.textContent=msg; el.className='flash show '+(tipo||'ok');
    if(tipo==='ok'){ setTimeout(function(){ el.className='flash'; },4000); }
    el.scrollIntoView({block:'nearest'});
  },
  cerrar: function(){ google.script.host.close(); },
  confirmar: function(msg){ return window.confirm(msg); },
  bad: function(el,on){ if(el) el.classList.toggle('bad',!!on); },
  // Llama a una funcion del servidor. onOk(resultado), onErr(error).
  call: function(fn,arg,onOk,onErr){
    google.script.run
      .withSuccessHandler(function(r){ if(onOk) onOk(r); })
      .withFailureHandler(function(e){ if(onErr) onErr(e); else S.flash(e.message||String(e),'err'); })
      [fn](arg);
  },
  // Autocompletado simple sobre una lista [{id,nombre}].
  autocomplete: function(input, hidden, items, onPick){
    var box=document.createElement('div'); box.className='ac-list';
    input.parentNode.appendChild(box);
    function render(txt){
      var t=(txt||'').toLowerCase();
      var res=items.filter(function(i){ return i.nombre.toLowerCase().indexOf(t)>=0; }).slice(0,30);
      if(!res.length){ box.innerHTML='<div class="ac-empty">Sin coincidencias</div>'; box.classList.add('show'); return; }
      box.innerHTML=res.map(function(i){ return '<div class="ac-item" data-id="'+S.esc(i.id)+'">'+S.esc(i.nombre)+'</div>'; }).join('');
      box.classList.add('show');
      Array.prototype.forEach.call(box.querySelectorAll('.ac-item'),function(d){
        d.onclick=function(){
          var it=items.filter(function(x){ return String(x.id)===d.getAttribute('data-id'); })[0];
          input.value=it.nombre; if(hidden) hidden.value=it.id; box.classList.remove('show');
          S.bad(input,false); if(onPick) onPick(it);
        };
      });
    }
    input.addEventListener('focus',function(){ render(input.value); });
    input.addEventListener('input',function(){ if(hidden) hidden.value=''; render(input.value); });
    input.addEventListener('blur',function(){ setTimeout(function(){ box.classList.remove('show'); },180); });
  },
  // Motor de fluidez: revelado de tarjetas (una sola vez) y barra de progreso.
  // El ocultado inicial lo hizo html.fx-anim antes de pintar; si esto no corre,
  // el failsafe quita fx-anim y todo queda visible.
  fx: function(){
    if(S._fx) return; S._fx=true;
    var root=document.documentElement;
    // Sin DOM real (p. ej. tests bajo Node): no hace nada.
    if(!root || !document.body || typeof document.body.insertBefore!=='function') return;
    var body=document.querySelector('.dlg-body');
    // anim solo si html.fx-anim fue activado en <head> (false con reduce-motion / sin JS)
    var anim = (root.className||'').indexOf('fx-anim')>=0;

    // Barra de progreso ligada al scroll del cuerpo (solo si hay desbordamiento)
    var bar=document.createElement('div'); bar.className='dlg-progress';
    var fill=document.createElement('i'); bar.appendChild(fill);
    document.body.insertBefore(bar, document.body.firstChild);
    function prog(){
      if(!body) return;
      var max=body.scrollHeight-body.clientHeight;
      if(max>4){ bar.classList.add('on'); fill.style.width=(body.scrollTop/max*100)+'%'; }
      else bar.classList.remove('on');
    }
    if(body) body.addEventListener('scroll',prog);
    window.addEventListener('resize',prog);
    setTimeout(prog,80);

    if(!anim || !body) return; // sin animacion: todo ya visible

    // Marca de stagger en las tarjetas (el ocultado ya lo puso html.fx-anim antes de pintar)
    var i=0;
    Array.prototype.forEach.call(body.querySelectorAll('.card'),function(el){
      if(!el.style.getPropertyValue('--i')) el.style.setProperty('--i', Math.min(i++,4));
    });

    // Revela UNA sola vez al entrar en vista (no se repite tras reflujos de fuentes)
    var sel='.card, .reveal, .steps li';
    if(!('IntersectionObserver' in window)){
      Array.prototype.forEach.call(body.querySelectorAll(sel),function(el){ el.classList.add('is-in'); });
      return;
    }
    var io=new IntersectionObserver(function(ents){
      ents.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('is-in'); io.unobserve(e.target); } });
    }, { root: body, rootMargin:'0px 0px -8% 0px', threshold:.02 });
    Array.prototype.forEach.call(body.querySelectorAll(sel),function(el){ io.observe(el); });
  }
};
if(document.readyState!=='loading'){ S.fx(); }
else document.addEventListener('DOMContentLoaded', function(){ S.fx(); });

</script>
<script>

(function () {
  if (window.google && window.google.script) return;
  var noop = function () {};
  var chain = {};
  ['withSuccessHandler', 'withFailureHandler', 'withUserObject'].forEach(function (k) {
    chain[k] = function () { return runProxy; };
  });
  var runProxy = new Proxy(chain, {
    get: function (t, p) { return (p in t) ? t[p] : noop; } // funciones de servidor: sin datos en preview
  });
  window.google = {
    script: {
      run: runProxy,
      host: { close: noop, setWidth: noop, setHeight: noop, origin: '' },
      url:  { getLocation: function (cb) { if (cb) cb({ parameter: {} }); } }
    }
  };
})();

<script>
// Copia EXACTA del <script> propio de src/DetallePresupuestoForm.html. NO editar sin sincronizar.
  var ID = "<?= presupuestoId ?>";
  var P = null;

  function cargar(){
    S.call('detallePresupuesto', ID, function(d){ P=d; render(d); },
       function(e){ document.getElementById('cuerpo').innerHTML='<div class="empty">'+S.esc(e.message||String(e))+'</div>'; });
  }

  function render(d){
    document.getElementById('titulo').textContent='Presupuesto '+d.id;
    var ing=d.lineas.filter(function(l){ return l.tipo==='ingrediente'; });
    var mat=d.lineas.filter(function(l){ return l.tipo==='material'; });

    var h='<div class="card"><div class="meta">'
      + '<div><b>Cliente</b>'+S.esc(d.cliente_nombre)+'</div>'
      + '<div><b>Producto</b>'+S.esc(d.receta_nombre)+'</div>'
      + '<div><b>Escalado</b>'+S.esc(d.modo_escalado)+' = '+S.num4(d.valor_escalado)+' (factor '+S.num4(d.factor_aplicado)+')</div>'
      + '<div><b>Raciones</b>'+S.num4(d.raciones_resultantes)+'</div>'
      + '<div><b>Emisión</b>'+S.esc(d.fecha_emision)+'</div>'
      + '<div><b>Vence</b>'+S.esc(d.fecha_vencimiento)+'</div>'
      + '<div><b>Estado</b><span class="stbadge st-'+S.esc(d.estado)+'">'+S.esc(d.estado)+'</span></div></div>'
      + (d.motivo_rechazo?'<div class="note">Motivo de rechazo: '+S.esc(d.motivo_rechazo)+'</div>':'')
      + '</div>';

    if(d.estado==='Pendiente') h+='<div id="avisoFaltantes"></div>';

    h+='<div class="card"><div class="grp-title">Ingredientes</div>'+tabla(ing)+'</div>';
    if(mat.length) h+='<div class="card"><div class="grp-title">Empaque y materiales</div>'+tabla(mat)+'</div>';

    h+='<div class="card"><div class="grp-title">Costos y precio</div><div class="totbox">'
      + linea('Costo de ingredientes', d.costo_ingredientes)
      + linea('Costo de materiales', d.costo_materiales)
      + linea('Mano de obra', d.costo_mano_obra)
      + linea('Costo indirecto', d.costo_indirecto)
      + linea('Depreciación', d.costo_depreciacion)
      + linea('Costo total', d.costo_total)
      + linea('Precio con ganancia ('+S.num4(d.margen)+'%)', d.precio_con_margen)
      + (d.aplica_igv==='SI'?linea('IGV ('+S.num4(d.tasa_igv)+'%)', d.monto_igv):'')
      + linea('Redondeo', d.redondeo_aplicado)
      + '<div class="totline grand"><span>Precio final</span><span class="num">'+S.money(d.precio_final)+'</span></div>'
      + '</div>'
      + (d.notas?'<div class="note">Notas: '+S.esc(d.notas)+'</div>':'')
      + '</div>';

    document.getElementById('cuerpo').innerHTML=h;

    // Botones según estado.
    var pie=document.getElementById('pie');
    var extra='';
    if(d.estado==='Pendiente'){
      extra='<button class="btn mini no" style="font-size:13.5px;padding:9px 18px" onclick="rechazar()">Rechazar</button>'
          + '<button class="btn primary" onclick="aprobar()">Aprobar</button>';
    }
    pie.innerHTML='<button class="btn" onclick="volver()">Volver a la lista</button>'+extra;

    // Aviso de stock que quedaría en falta si se aprueba.
    if(d.estado==='Pendiente') cargarFaltantes();
  }

  function cargarFaltantes(){
    S.call('faltantesDePresupuesto', ID, function(f){
      var box=document.getElementById('avisoFaltantes'); if(!box) return;
      if(!f || !f.length){
        box.className='aviso ok'; box.innerHTML='<b>Hay stock suficiente.</b>Aprobar no dejará insumos en negativo.';
        return;
      }
      var lista=f.map(function(x){ return S.esc(x.nombre)+' (faltan '+S.num4(x.faltante)+' '+'; tienes '+S.num4(x.disponible)+')'; }).join(', ');
      box.className='aviso warn';
      box.innerHTML='<b>Al aprobar, quedará stock en falta:</b>'+lista+'. Tendrás que comprarlo (revísalo en Comprar materiales).';
    }, function(e){ /* si falla, no bloquea la pantalla */ });
  }

  function tabla(arr){
    var t='<table class="t"><tr><th>Detalle</th><th class="n">Cantidad</th><th class="n">P. unit.</th><th class="n">Subtotal</th></tr>';
    if(!arr.length) t+='<tr><td colspan="4" class="empty">Sin líneas</td></tr>';
    arr.forEach(function(l){
      t+='<tr><td>'+S.esc(l.nombre)+'</td><td class="n">'+S.num4(l.cantidad)+' '+S.esc(l.unidad)+'</td>'
       + '<td class="n">'+S.num4(l.precio_unitario)+'</td><td class="n">'+S.money(l.subtotal)+'</td></tr>';
    });
    return t+'</table>';
  }
  function linea(lbl,val){ return '<div class="totline"><span>'+S.esc(lbl)+'</span><span class="num">'+S.money(val)+'</span></div>'; }

  function aprobar(){
    if(!S.confirmar('¿Aprobar el presupuesto '+ID+'?')) return;
    S.call('aprobarPresupuesto', ID, function(r){ S.flash(r.mensaje,'ok'); cargar(); });
  }
  function rechazar(){
    var motivo=window.prompt('Motivo del rechazo (opcional):',''); if(motivo===null) return;
    google.script.run.withSuccessHandler(function(r){ S.flash(r.mensaje,'ok'); cargar(); })
      .withFailureHandler(function(e){ S.flash(e.message||String(e),'err'); })
      .rechazarPresupuesto(ID, motivo);
  }
  function volver(){ google.script.run.abrirVerPresupuestos(); }

  cargar();

</script>
