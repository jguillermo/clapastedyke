<!-- Estilos.html : estilos y ayudantes compartidos por todas las ventanas.
     Se incluye con <?!= include('Estilos'); ?> dentro de cada HTML. -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Figtree:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#f7f1e8; --sheet:#ffffff; --ink:#2a2420; --muted:#8c8278;
    --line:#e7ddcf; --line-soft:#f0e8db;
    --accent:#bb5530; --accent-deep:#9a4324; --accent-soft:#f6e3d6;
    --green:#4f8a5b; --green-soft:#e1efe2;
    --amber:#cf9a32; --amber-soft:#f7ecd1;
    --red:#bf412c; --red-soft:#f7ddd6;
    --shadow:0 10px 30px -12px rgba(60,40,25,.28);
    --shadow-sm:0 2px 8px -3px rgba(60,40,25,.22);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Figtree",sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column;
  }
  .num{font-family:"Space Mono",monospace}

  /* Encabezado de la ventana */
  .dlg-head{display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;border-bottom:1px solid var(--line);
    background:linear-gradient(#fff,#fdfaf6);flex:0 0 auto}
  .dlg-head h3{font-family:"Fraunces",serif;font-size:18px;font-weight:600;margin:0}
  .dlg-head .x{color:var(--muted);font-size:20px;cursor:pointer;border:0;background:none;line-height:1}
  .dlg-head .x:hover{color:var(--ink)}

  /* Cuerpo con scroll y pie fijo */
  .dlg-body{padding:18px 20px;overflow:auto;flex:1 1 auto;background:var(--paper)}
  .dlg-foot{padding:13px 20px;border-top:1px solid var(--line);
    display:flex;justify-content:flex-end;gap:10px;background:#fdfaf6;flex:0 0 auto}

  /* Aviso de exito o error */
  .flash{display:none;margin:0 0 14px;padding:10px 13px;border-radius:10px;font-size:13px}
  .flash.show{display:block}
  .flash.ok{background:var(--green-soft);color:var(--green);border:1px solid #c4e0c8}
  .flash.err{background:var(--red-soft);color:var(--red);border:1px solid #e9c2b8}

  /* Botones */
  .btn{font-family:"Figtree";font-size:13.5px;font-weight:600;padding:9px 18px;border-radius:9px;
    border:1px solid var(--line);background:#fff;color:#5d544b;cursor:pointer}
  .btn:hover{border-color:var(--muted)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-deep)}
  .btn.primary:disabled{opacity:.55;cursor:default}
  .btn.ghost{background:none;border:0;color:var(--accent);padding:8px 6px}
  .btn.mini{font-size:11px;padding:4px 9px;border-radius:7px}
  .btn.mini.no{border-color:var(--red);color:var(--red)}

  /* Tarjetas de seccion */
  .card{background:#fff;border:1px solid var(--line);border-radius:13px;
    padding:18px;box-shadow:var(--shadow-sm);margin-bottom:14px}
  .grp-title{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--accent);margin:0 0 14px}

  /* Campos */
  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .lab{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
  .lab b{font-size:13px;font-weight:600}
  .req{color:var(--accent);font-weight:700}
  .opt{font-size:11px;color:var(--muted)}
  .typetag{font-family:"Space Mono",monospace;font-size:9.5px;text-transform:uppercase;
    letter-spacing:.04em;color:var(--muted);border:1px solid var(--line);border-radius:999px;
    padding:1px 7px;margin-left:auto}

  input,select,textarea{font-family:"Figtree";font-size:13.5px;color:var(--ink);
    border:1px solid var(--line);border-radius:9px;padding:9px 11px;width:100%;background:#fff;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  input.bad,select.bad,textarea.bad{border-color:var(--red);background:#fdf3f0}
  textarea{resize:vertical;min-height:54px}
  input[readonly],.ro{background:#f8f3ec;color:#6f655b}
  .calc{background:var(--accent-soft);border-color:#eecdba;color:var(--accent-deep);
    font-family:"Space Mono",monospace;font-weight:700}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .three{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:10px}

  /* Autocompletado */
  .ac{position:relative}
  .ac-list{position:absolute;left:0;right:0;top:calc(100% + 3px);background:#fff;
    border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);z-index:20;
    max-height:190px;overflow:auto;display:none}
  .ac-list.show{display:block}
  .ac-item{padding:8px 11px;font-size:13px;cursor:pointer}
  .ac-item:hover,.ac-item.sel{background:var(--accent-soft);color:var(--accent-deep)}
  .ac-empty{padding:8px 11px;font-size:12.5px;color:var(--muted)}

  /* Tablas */
  table.t{width:100%;border-collapse:collapse;font-size:12.5px;margin:2px 0}
  table.t th{text-align:left;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--muted);font-weight:400;padding:7px 8px;border-bottom:1px solid var(--line)}
  table.t td{padding:8px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  table.t td.n,table.t th.n{text-align:right;font-family:"Space Mono",monospace}
  table.t tr:last-child td{border-bottom:0}
  .empty{padding:18px;text-align:center;color:var(--muted);font-size:13px}

  /* Semaforo de stock */
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}
  .dot.rojo{background:var(--red)} .dot.amarillo{background:var(--amber)} .dot.verde{background:var(--green)}

  /* Lista de filas que se agregan (ingredientes, lineas) */
  .row-add{display:grid;gap:8px;align-items:end;margin-bottom:8px}
  .note{font-size:12.5px;color:var(--muted);margin-top:6px;padding:11px 13px;
    background:#fbf6ef;border-radius:10px;border:1px dashed var(--line)}
  .sub{font-size:12px;color:var(--muted);margin:0 0 12px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
  .toolbar h4{margin:0;font-family:"Fraunces",serif;font-size:16px}

  @media(max-width:620px){ .two,.three{grid-template-columns:1fr} }
</style>

<script>
  // Ayudantes compartidos.
  var S = {
    esc: function(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); },
    money: function(n){ n=Number(n)||0; return 'S/ '+n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2}); },
    num4: function(n){ n=Number(n)||0; return n.toLocaleString('es-PE',{minimumFractionDigits:4,maximumFractionDigits:4}); },
    flash: function(msg,tipo){
      var el=document.getElementById('flash'); if(!el) return;
      el.textContent=msg; el.className='flash show '+(tipo||'ok');
      if(tipo==='ok'){ setTimeout(function(){ el.className='flash'; },4000); }
      el.scrollIntoView({block:'nearest'});
    },
    cerrar: function(){ google.script.host.close(); },
    confirmar: function(msg){ return window.confirm(msg); },
    bad: function(el,on){ if(el) el.classList.toggle('bad',!!on); },
    // Llama a una funcion del servidor. onOk(resultado), onErr(error).
    call: function(fn,arg,onOk,onErr){
      google.script.run
        .withSuccessHandler(function(r){ if(onOk) onOk(r); })
        .withFailureHandler(function(e){ if(onErr) onErr(e); else S.flash(e.message||String(e),'err'); })
        [fn](arg);
    },
    // Autocompletado simple sobre una lista [{id,nombre}].
    autocomplete: function(input, hidden, items, onPick){
      var box=document.createElement('div'); box.className='ac-list';
      input.parentNode.appendChild(box);
      function render(txt){
        var t=(txt||'').toLowerCase();
        var res=items.filter(function(i){ return i.nombre.toLowerCase().indexOf(t)>=0; }).slice(0,30);
        if(!res.length){ box.innerHTML='<div class="ac-empty">Sin coincidencias</div>'; box.classList.add('show'); return; }
        box.innerHTML=res.map(function(i){ return '<div class="ac-item" data-id="'+S.esc(i.id)+'">'+S.esc(i.nombre)+'</div>'; }).join('');
        box.classList.add('show');
        Array.prototype.forEach.call(box.querySelectorAll('.ac-item'),function(d){
          d.onclick=function(){
            var it=items.filter(function(x){ return String(x.id)===d.getAttribute('data-id'); })[0];
            input.value=it.nombre; if(hidden) hidden.value=it.id; box.classList.remove('show');
            S.bad(input,false); if(onPick) onPick(it);
          };
        });
      }
      input.addEventListener('focus',function(){ render(input.value); });
      input.addEventListener('input',function(){ if(hidden) hidden.value=''; render(input.value); });
      input.addEventListener('blur',function(){ setTimeout(function(){ box.classList.remove('show'); },180); });
    }
  };
</script>
