<!-- Estilos.html : estilos y ayudantes compartidos por todas las ventanas.
     Se incluye con <?!= include('Estilos'); ?> dentro de cada HTML. -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Figtree:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=optional" rel="stylesheet">

<style>
  :root{
    --paper:#f7f1e8; --sheet:#ffffff; --ink:#2a2420; --muted:#8c8278;
    --line:#e7ddcf; --line-soft:#f0e8db;
    --accent:#bb5530; --accent-deep:#9a4324; --accent-soft:#f6e3d6;
    --green:#4f8a5b; --green-soft:#e1efe2;
    --amber:#cf9a32; --amber-soft:#f7ecd1;
    --red:#bf412c; --red-soft:#f7ddd6;
    --shadow:0 10px 30px -12px rgba(60,40,25,.28);
    --shadow-sm:0 2px 8px -3px rgba(60,40,25,.22);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Figtree",sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column;
  }
  .num{font-family:"Space Mono",monospace}

  /* Encabezado de la ventana */
  .dlg-head{display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;border-bottom:1px solid var(--line);
    background:linear-gradient(#fff,#fdfaf6);flex:0 0 auto}
  .dlg-head h3{font-family:"Fraunces",serif;font-size:18px;font-weight:600;margin:0}
  .dlg-head .x{color:var(--muted);font-size:20px;cursor:pointer;border:0;background:none;line-height:1}
  .dlg-head .x:hover{color:var(--ink)}

  /* Cuerpo con scroll y pie fijo */
  .dlg-body{padding:18px 20px;overflow:auto;flex:1 1 auto;background:var(--paper)}
  .dlg-foot{padding:13px 20px;border-top:1px solid var(--line);
    display:flex;justify-content:flex-end;gap:10px;background:#fdfaf6;flex:0 0 auto}

  /* Aviso de exito o error */
  .flash{display:none;margin:0 0 14px;padding:10px 13px;border-radius:10px;font-size:13px}
  .flash.show{display:block}
  .flash.ok{background:var(--green-soft);color:var(--green);border:1px solid #c4e0c8}
  .flash.err{background:var(--red-soft);color:var(--red);border:1px solid #e9c2b8}

  /* Botones */
  .btn{font-family:"Figtree";font-size:13.5px;font-weight:600;padding:9px 18px;border-radius:9px;
    border:1px solid var(--line);background:#fff;color:#5d544b;cursor:pointer}
  .btn:hover{border-color:var(--muted)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-deep)}
  .btn.primary:disabled{opacity:.55;cursor:default}
  .btn.ghost{background:none;border:0;color:var(--accent);padding:8px 6px}
  .btn.mini{font-size:11px;padding:4px 9px;border-radius:7px}
  .btn.mini.no{border-color:var(--red);color:var(--red)}

  /* Tarjetas de seccion */
  .card{background:#fff;border:1px solid var(--line);border-radius:13px;
    padding:18px;box-shadow:var(--shadow-sm);margin-bottom:14px}
  .grp-title{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--accent);margin:0 0 14px}

  /* Campos */
  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .lab{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
  .lab b{font-size:13px;font-weight:600}
  .req{color:var(--accent);font-weight:700}
  .opt{font-size:11px;color:var(--muted)}
  .typetag{font-family:"Space Mono",monospace;font-size:9.5px;text-transform:uppercase;
    letter-spacing:.04em;color:var(--muted);border:1px solid var(--line);border-radius:999px;
    padding:1px 7px;margin-left:auto}

  input,select,textarea{font-family:"Figtree";font-size:13.5px;color:var(--ink);
    border:1px solid var(--line);border-radius:9px;padding:9px 11px;width:100%;background:#fff;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  input.bad,select.bad,textarea.bad{border-color:var(--red);background:#fdf3f0}
  textarea{resize:vertical;min-height:54px}
  input[readonly],.ro{background:#f8f3ec;color:#6f655b}
  .calc{background:var(--accent-soft);border-color:#eecdba;color:var(--accent-deep);
    font-family:"Space Mono",monospace;font-weight:700}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .three{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:10px}

  /* Autocompletado */
  .ac{position:relative}
  .ac-list{position:absolute;left:0;right:0;top:calc(100% + 3px);background:#fff;
    border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);z-index:20;
    max-height:190px;overflow:auto;display:none}
  .ac-list.show{display:block}
  .ac-item{padding:8px 11px;font-size:13px;cursor:pointer}
  .ac-item:hover,.ac-item.sel{background:var(--accent-soft);color:var(--accent-deep)}
  .ac-empty{padding:8px 11px;font-size:12.5px;color:var(--muted)}

  /* Tablas */
  table.t{width:100%;border-collapse:collapse;font-size:12.5px;margin:2px 0}
  table.t th{text-align:left;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--muted);font-weight:400;padding:7px 8px;border-bottom:1px solid var(--line)}
  table.t td{padding:8px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  table.t td.n,table.t th.n{text-align:right;font-family:"Space Mono",monospace}
  table.t tr:last-child td{border-bottom:0}
  .empty{padding:18px;text-align:center;color:var(--muted);font-size:13px}

  /* Semaforo de stock */
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}
  .dot.rojo{background:var(--red)} .dot.amarillo{background:var(--amber)} .dot.verde{background:var(--green)}

  /* Lista de filas que se agregan (ingredientes, lineas) */
  .row-add{display:grid;gap:8px;align-items:end;margin-bottom:8px}
  .note{font-size:12.5px;color:var(--muted);margin-top:6px;padding:11px 13px;
    background:#fbf6ef;border-radius:10px;border:1px dashed var(--line)}
  .sub{font-size:12px;color:var(--muted);margin:0 0 12px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
  .toolbar h4{margin:0;font-family:"Fraunces",serif;font-size:16px}

  @media(max-width:620px){ .two,.three{grid-template-columns:1fr} }

  /* ===== Fluidez en el modal (ver doc/web_fuida.md) =====
     Para evitar parpadeo (FOUC) los estados ocultos se activan ANTES de pintar,
     via la clase html.fx-anim que el script anade de forma sincrona en <head>.
     Sin JS o con prefers-reduced-motion, fx-anim no se anade => todo visible. */

  /* Barra de progreso del scroll del cuerpo (dentro del modal, no fixed global) */
  .dlg-progress{flex:0 0 auto;height:3px;background:var(--line-soft);display:none}
  .dlg-progress.on{display:block}
  .dlg-progress i{display:block;height:100%;width:0;
    background:linear-gradient(90deg,var(--accent),var(--accent-deep));transition:width .08s linear}

  /* Encabezado: icono + titulo */
  .dlg-title{display:flex;align-items:center;gap:10px;min-width:0}
  .dlg-title h3{min-width:0}
  .dlg-ico{flex:0 0 auto;width:20px;height:20px;color:var(--accent)}

  /* Revelado de tarjetas/secciones (una sola vez, stagger suave).
     Se ocultan .card y .reveal ANTES de pintar => nunca se ven y luego desaparecen. */
  html.fx-anim .card, html.fx-anim .reveal{opacity:0;transform:translateY(16px);
    transition:opacity .5s ease, transform .55s cubic-bezier(.16,.84,.24,1);
    transition-delay:calc(var(--i,0) * 70ms)}
  html.fx-anim .card.is-in, html.fx-anim .reveal.is-in{opacity:1;transform:none}

  /* Icono SVG de linea que se dibuja solo (oculto antes de pintar via fx-anim) */
  .draw{stroke-dasharray:var(--len,260)}
  @keyframes draw{from{stroke-dashoffset:var(--len,260)} to{stroke-dashoffset:0}}
  html.fx-anim .dlg-head .draw{animation:draw 1s ease .25s both}
  html.fx-anim .draw.is-in{animation:draw .9s ease both}

  /* Pasos numerados con rebote + linea conectora (clase .steps opcional) */
  .steps{list-style:none;margin:0;padding:0}
  .steps li{position:relative;padding:0 0 14px 34px}
  .steps li::before{content:attr(data-n);position:absolute;left:0;top:0;width:22px;height:22px;
    border-radius:50%;background:var(--accent);color:#fff;font-family:"Space Mono",monospace;
    font-size:11px;display:flex;align-items:center;justify-content:center}
  .steps li::after{content:"";position:absolute;left:10px;top:24px;bottom:0;width:2px;background:var(--line)}
  .steps li:last-child::after{display:none}
  html.fx-anim .steps li::before{transform:scale(.2);opacity:0}
  html.fx-anim .steps li::after{transform:scaleY(0);transform-origin:top;transition:transform .5s ease}
  html.fx-anim .steps li.is-in::before{animation:pop .5s cubic-bezier(.34,1.56,.64,1) forwards}
  html.fx-anim .steps li.is-in::after{transform:scaleY(1)}
  @keyframes pop{to{transform:scale(1);opacity:1}}

  /* Microinteracciones de formulario */
  input,select,textarea{transition:border-color .18s ease,background-color .18s ease,box-shadow .18s ease}
  input:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px var(--accent-soft)}
  .btn{transition:background-color .18s ease,border-color .18s ease,transform .12s ease}
  .btn:active{transform:translateY(1px)}
  @keyframes shake{10%,90%{transform:translateX(-1px)}30%,70%{transform:translateX(2px)}50%{transform:translateX(-3px)}}
  input.bad,select.bad,textarea.bad{animation:shake .4s ease}
  .flash.show{animation:flashIn .32s cubic-bezier(.2,.7,.2,1)}
  @keyframes flashIn{from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none}}

  /* Vida ambiental: reaccion al hover y micro-movimiento continuo */
  .card{transition:transform .28s cubic-bezier(.16,.84,.24,1),box-shadow .28s ease}
  table.t td{transition:background-color .2s ease}
  @media(hover:hover){
    .card:hover{box-shadow:var(--shadow)}
    html.fx-anim .card.is-in:hover, html.fx-anim .reveal.is-in:hover{transform:translateY(-4px)}
    .btn:hover{transform:translateY(-1px)}
    .btn.primary:hover{box-shadow:0 9px 20px -8px var(--accent)}
    table.t tr:hover td{background:var(--accent-soft)}
  }
  /* Brillo que recorre el boton primario al pasar el cursor */
  .btn.primary{position:relative;overflow:hidden}
  .btn.primary::after{content:"";position:absolute;top:0;left:-70%;width:45%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.4),transparent);
    transform:skewX(-18deg);pointer-events:none}
  @media(hover:hover){ .btn.primary:hover::after{animation:sheen .75s ease} }
  @keyframes sheen{from{left:-70%}to{left:150%}}
  /* Punto de acento que respira (titulos de grupo) */
  @keyframes breathe{0%,100%{opacity:.35} 50%{opacity:1}}
  html.fx-anim .grp-title::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--accent);margin-right:8px;vertical-align:middle;animation:breathe 2.8s ease-in-out infinite}

  /* Puntero grueso (movil/tactil): atenua los hover finos */
  @media(hover:none){ .btn:hover{border-color:var(--line);transform:none} }

  /* Accesibilidad: sin movimiento => todo visible e instantaneo */
  @media(prefers-reduced-motion:reduce){
    *, *::before, *::after{animation:none!important;transition:none!important}
    html.fx-anim .card, html.fx-anim .reveal, .draw,
    html.fx-anim .steps li::before, html.fx-anim .steps li::after{
      opacity:1!important;transform:none!important;stroke-dashoffset:0!important}
    html.fx-anim .grp-title::before{display:none!important}
    .dlg-progress{display:none!important}
  }
</style>

<script>
  // Oculta los estados iniciales ANTES de pintar (evita el parpadeo desaparecer/reaparecer).
  // Sincrono y en <head>: corre antes de que el cuerpo se pinte. Solo si hay movimiento permitido.
  (function(){
    try{
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if(!reduce){
        document.documentElement.className += ' fx-anim';
        // Failsafe: si el motor no corre en 4s, no dejes nada oculto.
        setTimeout(function(){
          if(!(window.S && S._fx)){
            document.documentElement.className =
              document.documentElement.className.replace(/\s*\bfx-anim\b/,'');
          }
        }, 4000);
      }
    }catch(e){}
  })();

  // Ayudantes compartidos.
  var S = {
    esc: function(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); },
    money: function(n){ n=Number(n)||0; return 'S/ '+n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2}); },
    num4: function(n){ n=Number(n)||0; return n.toLocaleString('es-PE',{minimumFractionDigits:4,maximumFractionDigits:4}); },
    flash: function(msg,tipo){
      var el=document.getElementById('flash'); if(!el) return;
      el.textContent=msg; el.className='flash show '+(tipo||'ok');
      if(tipo==='ok'){ setTimeout(function(){ el.className='flash'; },4000); }
      el.scrollIntoView({block:'nearest'});
    },
    cerrar: function(){ google.script.host.close(); },
    confirmar: function(msg){ return window.confirm(msg); },
    bad: function(el,on){ if(el) el.classList.toggle('bad',!!on); },
    // Llama a una funcion del servidor. onOk(resultado), onErr(error).
    call: function(fn,arg,onOk,onErr){
      google.script.run
        .withSuccessHandler(function(r){ if(onOk) onOk(r); })
        .withFailureHandler(function(e){ if(onErr) onErr(e); else S.flash(e.message||String(e),'err'); })
        [fn](arg);
    },
    // Autocompletado simple sobre una lista [{id,nombre}].
    autocomplete: function(input, hidden, items, onPick){
      var box=document.createElement('div'); box.className='ac-list';
      input.parentNode.appendChild(box);
      function render(txt){
        var t=(txt||'').toLowerCase();
        var res=items.filter(function(i){ return i.nombre.toLowerCase().indexOf(t)>=0; }).slice(0,30);
        if(!res.length){ box.innerHTML='<div class="ac-empty">Sin coincidencias</div>'; box.classList.add('show'); return; }
        box.innerHTML=res.map(function(i){ return '<div class="ac-item" data-id="'+S.esc(i.id)+'">'+S.esc(i.nombre)+'</div>'; }).join('');
        box.classList.add('show');
        Array.prototype.forEach.call(box.querySelectorAll('.ac-item'),function(d){
          d.onclick=function(){
            var it=items.filter(function(x){ return String(x.id)===d.getAttribute('data-id'); })[0];
            input.value=it.nombre; if(hidden) hidden.value=it.id; box.classList.remove('show');
            S.bad(input,false); if(onPick) onPick(it);
          };
        });
      }
      input.addEventListener('focus',function(){ render(input.value); });
      input.addEventListener('input',function(){ if(hidden) hidden.value=''; render(input.value); });
      input.addEventListener('blur',function(){ setTimeout(function(){ box.classList.remove('show'); },180); });
    },
    // Motor de fluidez: revelado de tarjetas (una sola vez) y barra de progreso.
    // El ocultado inicial lo hizo html.fx-anim antes de pintar; si esto no corre,
    // el failsafe quita fx-anim y todo queda visible.
    fx: function(){
      if(S._fx) return; S._fx=true;
      var root=document.documentElement;
      // Sin DOM real (p. ej. tests bajo Node): no hace nada.
      if(!root || !document.body || typeof document.body.insertBefore!=='function') return;
      var body=document.querySelector('.dlg-body');
      // anim solo si html.fx-anim fue activado en <head> (false con reduce-motion / sin JS)
      var anim = (root.className||'').indexOf('fx-anim')>=0;

      // Barra de progreso ligada al scroll del cuerpo (solo si hay desbordamiento)
      var bar=document.createElement('div'); bar.className='dlg-progress';
      var fill=document.createElement('i'); bar.appendChild(fill);
      document.body.insertBefore(bar, document.body.firstChild);
      function prog(){
        if(!body) return;
        var max=body.scrollHeight-body.clientHeight;
        if(max>4){ bar.classList.add('on'); fill.style.width=(body.scrollTop/max*100)+'%'; }
        else bar.classList.remove('on');
      }
      if(body) body.addEventListener('scroll',prog);
      window.addEventListener('resize',prog);
      setTimeout(prog,80);

      if(!anim || !body) return; // sin animacion: todo ya visible

      // Marca de stagger en las tarjetas (el ocultado ya lo puso html.fx-anim antes de pintar)
      var i=0;
      Array.prototype.forEach.call(body.querySelectorAll('.card'),function(el){
        if(!el.style.getPropertyValue('--i')) el.style.setProperty('--i', Math.min(i++,4));
      });

      // Revela UNA sola vez al entrar en vista (no se repite tras reflujos de fuentes)
      var sel='.card, .reveal, .steps li';
      if(!('IntersectionObserver' in window)){
        Array.prototype.forEach.call(body.querySelectorAll(sel),function(el){ el.classList.add('is-in'); });
        return;
      }
      var io=new IntersectionObserver(function(ents){
        ents.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('is-in'); io.unobserve(e.target); } });
      }, { root: body, rootMargin:'0px 0px -8% 0px', threshold:.02 });
      Array.prototype.forEach.call(body.querySelectorAll(sel),function(el){ io.observe(el); });
    }
  };
  if(document.readyState!=='loading'){ S.fx(); }
  else document.addEventListener('DOMContentLoaded', function(){ S.fx(); });
</script>
