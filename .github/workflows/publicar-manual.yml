name: Publicar Manual y Juego

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Manual_de_usuario.html'
      - 'manual-juego/**'
      - '.github/workflows/publicar-manual.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: manual-juego/package-lock.json

      - name: Instalar dependencias del juego
        working-directory: manual-juego
        run: npm ci

      - name: Verificar formularios sin deriva (export == commiteado)
        working-directory: manual-juego
        run: |
          npm run exportar:formularios
          git diff --exit-code ../src/*Form.html \
            || { echo '::error::Los src/*Form.html no están sincronizados con los componentes. Corre npm run build:forms y commitea.'; exit 1; }

      - name: Construir el juego
        working-directory: manual-juego
        run: npm run build:pages

      - name: Preparar archivos
        run: |
          mkdir -p _site/juego
          cp Manual_de_usuario.html _site/Manual_de_usuario.html
          cp Manual_de_usuario.html _site/index.html
          cp -r manual-juego/dist/manual-juego/browser/* _site/juego/
          # Fallback SPA: recargar una ruta profunda del juego no debe dar 404
          cp _site/juego/index.html _site/juego/404.html

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
