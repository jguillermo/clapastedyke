name: Publicar Manual de Usuario

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar archivos
        run: |
          mkdir -p _site
          cp Manual_de_usuario.html _site/Manual_de_usuario.html
          cp Manual_de_usuario.html _site/index.html

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
