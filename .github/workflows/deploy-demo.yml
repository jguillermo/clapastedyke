name: Desplegar en GitHub Pages

# Cada push a `main` (merge de un pull request o push directo) dispara el deploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producción
        run: npm run build -- --base-href /clapastedyke/

      - name: Fallback SPA (404.html)
        run: cp dist/misaevol/browser/index.html dist/misaevol/browser/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/misaevol/browser

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
